paths:
  /admins:
    post:
      summary: Create a new Admin (Super Admin only)
      description: Allows a super admin to create a new admin account for a clinic.
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, npiNumber, role]
              properties:
                fullName: { type: string, example: "John Smith" }
                email: { type: string, format: email, example: "john.smith@cityclinic.com" }
                organizationName: { type: string, example: "City Allergy Clinic", description: "Clinic name to create or link to" }
                phone: { type: string, example: "+1-555-0123" }
                specialty: { type: string, example: "Immunology" }
                licenseNumber: { type: string, example: "WL123456" }
                npiNumber: { type: string, example: "1234567890", description: "10-digit National Provider Identifier" }
                stateOfLicensure: { type: string, example: "New York" }
                role: 
                  type: string
                  enum: [Allergist, Immunologist, Primary Care, Nurse Practitioner, Other]
                  example: "Immunologist"
      responses:
        200:
          description: Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Admin created successfully" }
                  data:
                    type: object
                    properties:
                      adminId: { type: string, format: uuid, example: "be39e48c-2b41-40a9-ab47-1d2aafb8b0a8" }
                      temporaryPassword: { type: string, example: "Temp4f8c9b2e!" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/clinicians:
    get:
      summary: List all clinicians created by the admin
      description: Returns a list of clinicians that were created by the currently logged-in admin.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of clinicians
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinicians fetched successfully" }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid, example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        user_id: { type: string, format: uuid, example: "e9f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        full_name: { type: string, example: "Dr. Willson" }
                        email: { type: string, format: email, example: "wilson@gmail.com" }
                        status: { type: string, example: "active" }
                        clinical_role: { type: string, example: "Immunologist" }
                        specialty: { type: string, example: "Pediatrics" }
                        npi_number: { type: string, example: "1234567890" }
                        state_of_licensure: { type: string, example: "NY" }
                        created_at: { type: string, format: date-time, example: "2026-05-12T13:30:00Z" }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/dashboard/population:
    get:
      summary: Get Population Dashboard metrics
      description: Returns aggregated metrics for the admin's entire assigned patient population.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Population dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Population dashboard fetched successfully" }
                  data:
                    type: object
                    properties:
                      active_users: { type: integer, example: 247 }
                      daily_logs: { type: integer, example: 189 }
                      adherence_rate: { type: integer, example: 87 }
                      avg_symptom_score: { type: number, format: float, example: 4.2 }
                      alerts_today: { type: integer, example: 12 }
                      user_engagement:
                        type: object
                        properties:
                          daily_active_users: { type: integer, example: 76 }
                          weekly_active_users: { type: integer, example: 89 }
                          logging_compliance: { type: integer, example: 82 }
                      system_health:
                        type: object
                        properties:
                          api_response_time: { type: string, example: "125ms" }
                          system_uptime: { type: string, example: "99.9%" }
                          data_sync_status: { type: string, example: "Healthy" }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics/adherence:
    get:
      summary: Get Adherence Analytics metrics
      description: Returns aggregated adherence metrics for the admin's entire assigned patient population.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Adherence Analytics metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Adherence analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      average_adherence_percentage: { type: integer, example: 87 }
                      active_medication_plans: { type: integer, example: 470 }
                      missed_doses_today: { type: integer, example: 32 }
                      aggregated_adherence_percentage: { type: integer, example: 85 }
                      adherence_distribution:
                        type: object
                        properties:
                          excellent_count: { type: integer, example: 185 }
                          moderate_count: { type: integer, example: 48 }
                          needs_support_count: { type: integer, example: 14 }
                      adherence_by_medication_type:
                        type: array
                        items:
                          type: object
                          properties:
                            type: { type: string, example: "Nasal Sprays" }
                            count: { type: integer, example: 145 }
                      missed_reasons_breakdown:
                        type: object
                        properties:
                          forgot_percentage: { type: integer, example: 45 }
                          side_effects_percentage: { type: integer, example: 18 }
                          unavailable_percentage: { type: integer, example: 12 }
                          other_percentage: { type: integer, example: 25 }
                      weekly_adherence_trend:
                        type: array
                        items:
                          type: object
                          properties:
                            week: { type: string, example: "Week 1" }
                            adherence_percentage: { type: integer, example: 84 }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics/symptoms:
    get:
      summary: Get Symptom Trends Analytics metrics
      description: Returns population-level symptom analysis and trends for the admin's entire assigned patient base.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Symptom Trends Analytics metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Symptom analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      top_kpis:
                        type: object
                        properties:
                          respiratory:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 4.0 }
                              percentage_change: { type: integer, example: -17 }
                          nasal:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 4.2 }
                              percentage_change: { type: integer, example: -18 }
                          skin:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 2.7 }
                              percentage_change: { type: integer, example: -15 }
                      trends_14_day:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date, example: "2026-05-14" }
                            respiratory: { type: number, format: float, example: 4.1 }
                            nasal: { type: number, format: float, example: 4.3 }
                            skin: { type: number, format: float, example: 2.8 }
                      current_symptom_distribution:
                        type: array
                        items:
                          type: object
                          properties:
                            severity_range: { type: string, example: "0-2" }
                            count: { type: integer, example: 78 }
                      month_over_month_comparison:
                        type: object
                        properties:
                          current_month:
                            type: object
                            properties:
                              respiratory: { type: number, format: float, example: 4.0 }
                              nasal: { type: number, format: float, example: 4.2 }
                              skin: { type: number, format: float, example: 2.7 }
                          previous_month:
                            type: object
                            properties:
                              respiratory: { type: number, format: float, example: 4.8 }
                              nasal: { type: number, format: float, example: 5.1 }
                              skin: { type: number, format: float, example: 3.2 }
        401: { description: Unauthorized }
        403: { description: Forbidden }
