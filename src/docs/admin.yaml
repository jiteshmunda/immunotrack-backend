paths:
  /admins:
    post:
      summary: Create a new Admin (Super Admin only)
      description: Allows a super admin to create a new admin account for a clinic.
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, npiNumber, role]
              properties:
                fullName: { type: string, example: "John Smith" }
                email: { type: string, format: email, example: "john.smith@cityclinic.com" }
                organizationName: { type: string, example: "City Allergy Clinic", description: "Clinic name to create or link to" }
                phone: { type: string, example: "+1-555-0123" }
                specialty: { type: string, example: "Immunology" }
                licenseNumber: { type: string, example: "WL123456" }
                npiNumber: { type: string, example: "1234567890", description: "10-digit National Provider Identifier" }
                stateOfLicensure: { type: string, example: "New York" }
                role: 
                  type: string
                  enum: [Allergist, Immunologist, Primary Care, Nurse Practitioner, Other]
                  example: "Immunologist"
                is_clinician:
                  type: boolean
                  example: true
                  description: "Set to false to create a Pure Admin without medical privileges."
      responses:
        200:
          description: Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Admin created successfully" }
                  data:
                    type: object
                    properties:
                      adminId: { type: string, format: uuid, example: "be39e48c-2b41-40a9-ab47-1d2aafb8b0a8" }
                      temporaryPassword: { type: string, example: "Temp4f8c9b2e!" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/system:
    post:
      summary: Create a new System Admin (Super Admin only)
      description: Allows a super admin to create a new system admin account with organization details.
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, organizationName]
              properties:
                fullName: { type: string, example: "System Administrator" }
                email: { type: string, format: email, example: "sysadmin@platform.com" }
                organizationName: { type: string, example: "Global Health Network", description: "Organization name is required for system admins" }
      responses:
        200:
          description: System Admin created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "System Admin created successfully" }
                  data:
                    type: object
                    properties:
                      adminId: { type: string, format: uuid, example: "be39e48c-2b41-40a9-ab47-1d2aafb8b0a8" }
                      temporaryPassword: { type: string, example: "Temp4f8c9b2e!" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/clinicians:
    get:
      summary: List all clinicians created by the admin
      description: Returns a list of clinicians that were created by the currently logged-in admin.
      tags: [Admin - Clinician Management]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, archived]
          description: Filter by user account status
        - in: query
          name: role
          schema:
            type: string
            enum: [admin, clinician, super admin]
          description: Filter by system role
        - in: query
          name: clinical_role
          schema:
            type: string
          description: Filter by clinical title (e.g., Immunologist)
        - in: query
          name: search
          schema:
            type: string
          description: Search by name, email, or specialty
        - in: query
          name: is_clinician
          schema: { type: boolean }
          description: Filter by whether the user is a medical provider (true) or a pure admin (false)
      responses:
        200:
          description: List of clinicians
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinicians fetched successfully" }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid, example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        user_id: { type: string, format: uuid, example: "e9f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        full_name: { type: string, example: "Dr. Willson" }
                        email: { type: string, format: email, example: "wilson@gmail.com" }
                        status: { type: string, example: "active" }
                        clinical_role: { type: string, example: "Immunologist" }
                        specialty: { type: string, example: "Pediatrics" }
                        npi_number: { type: string, example: "1234567890" }
                        state_of_licensure: { type: string, example: "NY" }
                        is_clinician: { type: boolean, example: true }
                        created_at: { type: string, format: date-time, example: "2026-05-12T13:30:00Z" }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/clinicians/with-patients:
    get:
      summary: List all clinicians with their assigned patients
      description: Returns a list of clinicians created by the admin, including the list and count of patients assigned to each clinician.
      tags: [Admin - Clinician Management]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, archived]
          description: Filter by user account status
        - in: query
          name: role
          schema:
            type: string
            enum: [admin, clinician, super admin]
          description: Filter by system role
        - in: query
          name: clinical_role
          schema:
            type: string
          description: Filter by clinical title (e.g., Immunologist)
        - in: query
          name: search
          schema:
            type: string
          description: Search by name, email, or specialty
        - in: query
          name: is_clinician
          schema: { type: boolean }
          description: Filter by whether the user is a medical provider (true) or a pure admin (false)
      responses:
        200:
          description: List of clinicians with their patients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinicians with patients fetched successfully" }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid, example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        user_id: { type: string, format: uuid, example: "e9f1718b-ccff-47e0-b31b-8929c853f9b4" }
                        full_name: { type: string, example: "Dr. Willson" }
                        email: { type: string, format: email, example: "wilson@gmail.com" }
                        status: { type: string, example: "active" }
                        clinical_role: { type: string, example: "Immunologist" }
                        specialty: { type: string, example: "Pediatrics" }
                        npi_number: { type: string, example: "1234567890" }
                        state_of_licensure: { type: string, example: "NY" }
                        is_clinician: { type: boolean, example: true }
                        created_at: { type: string, format: date-time, example: "2026-05-12T13:30:00Z" }
                        patient_count: { type: integer, example: 5 }
                        patients:
                          type: array
                          items:
                            type: object
                            properties:
                              id: { type: string, format: uuid }
                              user_id: { type: string, format: uuid }
                              full_name: { type: string, example: "Jane Doe" }
                              email: { type: string, format: email, example: "jane.doe@example.com" }
                              status: { type: string, example: "active" }
                              mrn: { type: string, example: "MRN-12345" }
                              date_of_birth: { type: string, format: date }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/clinicians/{id}:
    get:
      summary: Get Clinician Details
      description: Returns the full profile details for a specific clinician.
      tags: [Admin - Clinician Management]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Clinician details
        403: { description: Forbidden }
        404: { description: Not Found }
    delete:
      summary: Delete a clinician
      description: Soft deletes a clinician (archives user) and unassigns all their patients. Can only be performed by the admin who created the clinician.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the clinician to delete
      responses:
        200:
          description: Clinician successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinician successfully deleted!!" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }
        404: { description: Not Found }

  /admins/clinicians/{id}/role:
    put:
      summary: Update a clinician's role
      description: Allows an admin to change a clinician's role and optionally remove their medical privileges.
      tags: [Admin - Clinician Management]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_role_name]
              properties:
                new_role_name: { type: string, example: "admin" }
                is_clinician: { type: boolean, example: false }
      responses:
        200:
          description: Role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinician role successfully updated to admin and medical privileges removed" }
        400:
          description: Bad Request (e.g., active patients exist)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error: { type: string, example: "Cannot convert to Admin-Only: Clinician has active patients. Please transfer them to another provider first." }
        401: { description: Unauthorized }
        403: { description: Forbidden }
        404: { description: Not Found }

  /admins/patients:
    get:
      summary: Get all patients in the organization
      description: Returns a paginated list of all patients assigned to any clinician within the admin's organization.
      tags: [Admin - Patient Management]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, suspended, archived] }
          description: Filter by user account status
        - in: query
          name: clinician_id
          schema: { type: string, format: uuid }
          description: Filter by specific assigned clinician
        - in: query
          name: search
          schema: { type: string }
          description: Search by name or email
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        200:
          description: List of patients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      total: { type: integer, example: 120 }
                      limit: { type: integer, example: 50 }
                      offset: { type: integer, example: 0 }
                      patients:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            user_id: { type: string, format: uuid }
                            full_name: { type: string, example: "Jane Doe" }
                            email: { type: string, format: email, example: "jane.doe@example.com" }
                            status: { type: string, example: "active" }
                            is_rpm_active: { type: boolean, example: true }
                            clinician_name: { type: string, example: "Dr. Willson" }
                            created_at: { type: string, format: date-time }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/patients/{id}:
    get:
      summary: Get Patient Details
      description: Returns read-only full profile details for a specific patient within the organization.
      tags: [Admin - Patient Management]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: Patient details
        401: { description: Unauthorized }
        403: { description: "Forbidden: Patient not found or not in your organization" }
        404: { description: Not Found }

  /admins/dashboard/population:
    get:
      summary: Get Population Dashboard metrics
      description: Returns aggregated metrics for the admin's entire assigned patient population.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Population dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Population dashboard fetched successfully" }
                  data:
                    type: object
                    properties:
                      active_patients: { type: integer, example: 247 }
                      active_clinicians: { type: integer, example: 12 }
                      daily_logs: { type: integer, example: 189 }
                      adherence_rate: { type: integer, example: 87 }
                      avg_symptom_score: { type: number, format: float, example: 4.2 }
                      alerts_today: { type: integer, example: 12 }
                      todays_audit_events_count: { type: integer, example: 45 }
                      user_engagement:
                        type: object
                        properties:
                          daily_active_users: { type: integer, example: 76 }
                          weekly_active_users: { type: integer, example: 89 }
                          logging_compliance: { type: integer, example: 82 }
                      system_health:
                        type: object
                        properties:
                          api_response_time: { type: string, example: "125ms" }
                          system_uptime: { type: string, example: "99.9%" }
                          data_sync_status: { type: string, example: "Healthy" }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics:
    get:
      summary: Get Admin Analytics
      description: Returns practice-wide metrics across the organization without clinician-level duplication.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Analytics fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      total_patients: { type: integer, example: 48 }
                      composite_score_trends:
                        type: object
                        properties:
                          min: { type: number, example: 0 }
                          q1: { type: number, example: 2.6 }
                          median: { type: number, example: 4.1 }
                          q3: { type: number, example: 5.3 }
                          max: { type: number, example: 10 }
                      medication_adherence: { type: integer, example: 46 }
                      active_alerts_count:
                        type: array
                        items:
                          type: object
                          properties:
                            clinician: { type: string, example: "Dr Allison" }
                            count: { type: integer, example: 8 }
                      clinician_activity:
                        type: array
                        items:
                          type: object
                          properties:
                            clinician: { type: string, example: "Dr Allison" }
                            patients_invited: { type: integer, example: 0 }
                            alerts_resolved: { type: integer, example: 26 }
                      audit_log_summary: { type: integer, example: 3853 }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics/adherence:
    get:
      summary: Get Adherence Analytics metrics
      description: Returns aggregated adherence metrics for the admin's entire assigned patient population.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Adherence Analytics metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Adherence analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      average_adherence_percentage: { type: integer, example: 87 }
                      active_medication_plans: { type: integer, example: 470 }
                      missed_doses_today: { type: integer, example: 32 }
                      aggregated_adherence_percentage: { type: integer, example: 85 }
                      adherence_distribution:
                        type: object
                        properties:
                          excellent_count: { type: integer, example: 185 }
                          moderate_count: { type: integer, example: 48 }
                          needs_support_count: { type: integer, example: 14 }
                      adherence_by_medication_type:
                        type: array
                        items:
                          type: object
                          properties:
                            type: { type: string, example: "Nasal Sprays" }
                            count: { type: integer, example: 145 }
                      missed_reasons_breakdown:
                        type: object
                        properties:
                          forgot_percentage: { type: integer, example: 45 }
                          side_effects_percentage: { type: integer, example: 18 }
                          unavailable_percentage: { type: integer, example: 12 }
                          other_percentage: { type: integer, example: 25 }
                      weekly_adherence_trend:
                        type: array
                        items:
                          type: object
                          properties:
                            week: { type: string, example: "Week 1" }
                            adherence_percentage: { type: integer, example: 84 }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics/symptoms:
    get:
      summary: Get Symptom Trends Analytics metrics
      description: Returns population-level symptom analysis and trends for the admin's entire assigned patient base.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Symptom Trends Analytics metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Symptom analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      top_kpis:
                        type: object
                        properties:
                          respiratory:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 4.0 }
                              percentage_change: { type: integer, example: -17 }
                          nasal:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 4.2 }
                              percentage_change: { type: integer, example: -18 }
                          skin:
                            type: object
                            properties:
                              avg_score: { type: number, format: float, example: 2.7 }
                              percentage_change: { type: integer, example: -15 }
                      trends_14_day:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date, example: "2026-05-14" }
                            respiratory: { type: number, format: float, example: 4.1 }
                            nasal: { type: number, format: float, example: 4.3 }
                            skin: { type: number, format: float, example: 2.8 }
                      current_symptom_distribution:
                        type: array
                        items:
                          type: object
                          properties:
                            severity_range: { type: string, example: "0-2" }
                            count: { type: integer, example: 78 }
                      month_over_month_comparison:
                        type: object
                        properties:
                          current_month:
                            type: object
                            properties:
                              respiratory: { type: number, format: float, example: 4.0 }
                              nasal: { type: number, format: float, example: 4.2 }
                              skin: { type: number, format: float, example: 2.7 }
                          previous_month:
                            type: object
                            properties:
                              respiratory: { type: number, format: float, example: 4.8 }
                              nasal: { type: number, format: float, example: 5.1 }
                              skin: { type: number, format: float, example: 3.2 }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/analytics/risk-clusters:
    get:
      summary: Get Risk Clusters Analytics metrics
      description: Returns population-level risk stratification and escalation monitoring for the admin's entire assigned patient base.
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Risk Clusters Analytics metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Risk cluster analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      top_kpis:
                        type: object
                        properties:
                          total_patients: { type: integer, example: 247 }
                          low_risk:
                            type: object
                            properties:
                              count: { type: integer, example: 198 }
                              percentage: { type: integer, example: 80 }
                          moderate_risk:
                            type: object
                            properties:
                              count: { type: integer, example: 35 }
                              percentage: { type: integer, example: 14 }
                          high_risk:
                            type: object
                            properties:
                              count: { type: integer, example: 14 }
                              percentage: { type: integer, example: 6 }
                      risk_distribution:
                        type: array
                        items:
                          type: object
                          properties:
                            category: { type: string, example: "Low Risk" }
                            percentage: { type: integer, example: 80 }
                      risk_escalations_8_days:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date, example: "2026-05-14" }
                            escalations: { type: integer, example: 3 }
                      critical_risk:
                        type: object
                        properties:
                          declining_composite_score: { type: integer, example: 8 }
                          severe_symptom_scores: { type: integer, example: 5 }
                      moderate_risk:
                        type: object
                        properties:
                          poor_adherence: { type: integer, example: 12 }
                          missed_check_ins: { type: integer, example: 6 }
                      escalations_trending_7_days:
                        type: object
                        properties:
                          low_to_moderate: { type: integer, example: 4 }
                          moderate_to_high: { type: integer, example: 3 }
                          total_escalations: { type: integer, example: 7 }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /admins/audit-logs:
    get:
      summary: Get Audit Logs
      description: Returns paginated audit log entries with full action metadata.
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: patient_id
          schema: { type: string, format: uuid }
          description: Filter by patient ID
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
          description: Filter by user ID
        - in: query
          name: action_type
          schema: { type: string }
          description: Filter by action type (e.g., READ_PHI)
        - in: query
          name: date_from
          schema: { type: string, format: date-time }
          description: Filter from this date (UTC ISO string)
        - in: query
          name: date_to
          schema: { type: string, format: date-time }
          description: Filter up to this date (UTC ISO string)
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
          description: Limit number of records per page
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
          description: Offset for pagination
      responses:
        200:
          description: Audit logs fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Audit logs fetched successfully" }
                  data:
                    type: object
                    properties:
                      total: { type: integer, example: 120 }
                      limit: { type: integer, example: 50 }
                      offset: { type: integer, example: 0 }
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid, example: "b52d9b68-80f0-4c3e-8c6c-8f3a3d548325" }
                            userId: { type: string, format: uuid, example: "8e0e7cf2-763d-4c36-bc21-2a1496a7d5eb" }
                            action: { type: string, example: "READ_PHI" }
                            resourceType: { type: string, example: "patient" }
                            resourceId: { type: string, format: uuid, example: "a43e4fc2-50d4-4a5f-9e7b-8c6c1d538102" }
                            ipAddress: { type: string, example: "192.168.1.100" }
                            userAgent: { type: string, example: "Mozilla/5.0..." }
                            status: { type: string, example: "success" }
                            metadata: { type: object, additionalProperties: true, example: { role: "admin" } }
                            createdAt: { type: string, format: date-time, example: "2026-05-28T12:00:00Z" }
        401: { description: Unauthorized }
