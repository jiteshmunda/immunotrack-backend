paths:
  /alerts:
    get:
      summary: Retrieve active clinical alerts
      description: Retrieve active clinical alerts. Admins see all alerts across their organization, Clinicians see only alerts for their directly assigned patients.
      tags: [Clinical Alerts]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of active alerts retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        patient_id: { type: string, format: uuid }
                        patient_name: { type: string, example: "Michael Chen" }
                        alert_type: { type: string, example: "symptom_deterioration" }
                        description: { type: string, example: "Patient's overall risk score has reached 9.5/10." }
                        severity: { type: string, example: "High" }
                        status: { type: string, example: "active" }
                        created_at: { type: string, format: date-time }
                        lastTriggeredAt: { type: string, format: date-time }
                        risk_score: { type: number, nullable: true, example: 9.5 }
                        domain: { type: string, nullable: true, example: "nasal" }
                        alert_subtype: { type: string, nullable: true, example: "consecutive_streak" }
                        severity_from: { type: string, nullable: true, example: "amber" }
                        severity_to: { type: string, nullable: true, example: "red" }
                        composite_score_at_trigger: { type: number, nullable: true, example: 29 }
                        composite_score_current: { type: number, nullable: true, example: 29 }
                        streak_days: { type: integer, nullable: true, example: 5 }
                        weekly_change_pct: { type: number, nullable: true, example: 45 }
                        medication_name: { type: string, nullable: true, example: null }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /alerts/{id}/resolve:
    patch:
      summary: Mark a clinical alert as resolved
      tags: [Clinical Alerts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: The ID of the alert to resolve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution_note:
                  type: string
                  example: "Clinician adjusted patient controller daily doses and followed up via phone."
                  maxLength: 500
      responses:
        200:
          description: Alert resolved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  resolved_at: { type: string, format: date-time }
                  resolution_note: { type: string, example: "Clinician adjusted patient controller daily doses and followed up via phone." }
        401: { description: Unauthorized }
        403: { description: "Forbidden: You are not assigned to this patient" }
        404: { description: Alert not found }
