paths:
  /clinicians:
    post:
      summary: Create new clinician (Admin only)
      description: Allows an administrator to create a clinician account.
      tags: [Clinician]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, licenseNumber, npiNumber]
              properties:
                fullName: { type: string, example: "Dr. Willson" }
                email: { type: string, format: email, example: "wilson@gmail.com" }
                specialty: { type: string, example: "Pediatrician" }
                licenseNumber: { type: string, example: "WL123456" }
                npiNumber: { type: string, example: "1234567890", description: "10-digit National Provider Identifier" }
                phone: { type: string, example: "+1-555-0123" }
                stateOfLicensure: { type: string, example: "California" }
                organizationName: { type: string, example: "City Allergy Clinic" }
                role: 
                  type: string
                  enum: [Allergist, Immunologist, Primary Care, Nurse Practitioner, Other]
                  example: "Allergist"
      responses:
        200:
          description: Clinician created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinician created successfully" }
                  data:
                    type: object
                    properties:
                      clinicianId: { type: string, format: uuid, example: "be39e48c-2b41-40a9-ab47-1d2aafb8b0a8" }
                      temporaryPassword: { type: string, example: "64eb1e9c8e1162ca" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }
  
  /clinicians/patients:
    get:
      summary: List all patients assigned to the clinician
      description: Returns a list of patients assigned to the logged-in clinician, including their clinical risk status.
      tags: [Clinician]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search patients by name (partial match, case-insensitive)
      responses:
        200:
          description: List of assigned patients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Assigned patients fetched successfully" }
                  data:
                    type: object
                    properties:
                      total_patient_count: { type: integer, example: 25 }
                      total_high_risk_count: { type: integer, example: 3 }
                      patients:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid, example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4" }
                            name: { type: string, example: "Jane Doe" }
                            primary_diagnosis: { type: string, example: "Persistent Asthma" }
                            last_logged_date: { type: string, format: date-time, example: "2026-05-12T13:30:00Z" }
                            risk_score: { type: number, example: 8.5 }
                            risk_level: { type: string, enum: [Low, Moderate, High], example: "Moderate" }
        401: { description: Unauthorized }
        403: { description: Forbidden }

  /clinician/invite:
    post:
      summary: Clinician invites a patient to join (HIPAA-Compliant)
      tags: [Clinician]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_first_name, patient_last_name, patient_email, patient_dob, patient_diagnosis, icd10_code, rpm_enrolled]
              properties:
                patient_first_name: { type: string, example: "Jane" }
                patient_last_name: { type: string, example: "Doe" }
                patient_email: { type: string, format: email, example: "jane.doe@example.com" }
                patient_dob: { type: string, format: date, example: "1990-05-15" }
                patient_diagnosis: { type: string, example: "Persistent Asthma" }
                icd10_code: { type: string, example: "J45.20" }
                rpm_enrolled: { type: boolean, example: true }
                personal_message: { type: string, maxLength: 500, example: "Welcome to our monitoring program." }
      responses:
        201:
          description: Patient invited successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  invite_id: { type: string, format: uuid, example: "a5c9e7c9-c094-496c-a288-0ae21c32312f" }
                  invite_code_display: { type: string, example: "IMMU-NNT6-RKSN" }
                  expires_at: { type: string, format: date-time, example: "2026-04-19T11:18:37Z" }
        401: { description: Unauthorized }

  /clinician/invite/{invite_id}/resend:
    post:
      summary: Resend a patient invitation
      tags: [Clinician]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Invitation resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  invite_id: { type: string, format: uuid, example: "b6d8f1e2-c34a-4d9b-a123-e456f7890abc" }
                  invite_code_display: { type: string, example: "IMMU-NNT6-RKSN" }
                  expires_at: { type: string, format: date-time, example: "2026-04-19T12:00:00Z" }
        401: { description: Unauthorized }
        404: { description: Invite not found }

  /clinician/invite/{invite_id}:
    delete:
      summary: Cancel/Invalidate a pending invitation
      tags: [Clinician]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Invitation cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
        401: { description: Unauthorized }
        404: { description: Invite not found }
  /clinicians/patients/{patientId}/notes:
    post:
      summary: Add a clinical note for a patient
      description: Allows a clinician to add an encrypted clinical note to a patient's record. HIPAA-compliant.
      tags: [Clinician]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: patientId
          required: true
          schema:
            type: string
            format: uuid
          example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note_type, notes]
              properties:
                note_type:
                  type: string
                  example: "Treatment Plan"
                  description: "Type of clinical note (e.g., Assessment, Plan)"
                notes:
                  type: string
                  example: "Patient to continue current medication with increased dosage."
                  minLength: 10
                  maxLength: 5000
      responses:
        200:
          description: Clinical note added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinical note added successfully" }
                  data:
                    type: object
                    properties:
                      note_type: { type: string, example: "Treatment Plan" }
                      notes: { type: string, example: "Patient to continue current medication with increased dosage." }
                      created_at: { type: string, format: date-time, example: "2026-05-12T13:30:00Z" }
                      clinician_name: { type: string, example: "Dr. Willson" }
        400: { description: Bad Request }
        401: { description: Unauthorized }
        403: { description: Forbidden }
        404: { description: Patient not found }

  /clinicians/patients/{patientId}/details:
    get:
      summary: Get comprehensive patient details
      description: Returns a complete view of a patient's status, including profile, risk stats, symptom trends, clinical notes, medications, and active alerts.
      tags: [Clinician]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: patientId
          required: true
          schema:
            type: string
            format: uuid
          example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4"
      responses:
        200:
          description: Patient details fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Patient details fetched successfully" }
                  data:
                    type: object
                    properties:
                      profile:
                        type: object
                        properties:
                          id: { type: string, example: "c7f1718b-ccff-47e0-b31b-8929c853f9b4" }
                          name: { type: string, example: "Jane Doe" }
                          email: { type: string, example: "jane.doe@example.com" }
                          dob: { type: string, example: "1990-05-15" }
                          sex: { type: string, example: "Female" }
                          mrn: { type: string, example: "MRN-12345" }
                          phone: { type: string, example: "+1-555-0123" }
                          primary_diagnosis: { type: string, example: "Persistent Asthma" }
                      stats:
                        type: object
                        properties:
                          risk_score: { type: number, example: 7.8 }
                          risk_level: { type: string, example: "High" }
                          active_alerts: { type: integer, example: 2 }
                      symptom_trends:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date, example: "2026-05-12" }
                            respiratory: { type: number, example: 1.5 }
                            nasal: { type: number, example: 12 }
                            skin: { type: number, example: 8 }
                            risk_score: { type: number, example: 7.2 }
                      clinical_notes:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            type: { type: string, example: "Assessment" }
                            notes: { type: string, example: "Patient reporting improvement." }
                            clinician_name: { type: string, example: "Dr. Emily Carter" }
                            created_at: { type: string, format: date-time }
                      medication_adherence:
                        type: object
                        properties:
                          percentage: { type: number, example: 33.33 }
                          status: { type: string, example: "Stable" }
                          trend_text: { type: string, example: "↑ 0% vs previous 30 days" }
                          medications:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string, format: uuid }
                                name: { type: string, example: "Cetirizine" }
                                category: { type: string, example: "Antihistamine" }
                                frequency: { type: string, example: "Once daily" }
                                startDate: { type: string, format: date, example: "2026-05-14" }
                                isPrn: { type: boolean, example: false }
                                calculationWindow:
                                  type: object
                                  properties:
                                    start: { type: string, format: date, example: "2026-05-14" }
                                    end: { type: string, format: date, example: "2026-05-18" }
                                    totalDays: { type: integer, example: 5 }
                                daysTaken: { type: integer, example: 4 }
                                adherencePercentage: { type: number, example: 100 }
                                rolling7DayAdherence: { type: number, example: 100 }
                                prnUsageText: { type: string, nullable: true, example: null }
                                adherenceLogs30Days:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      date: { type: string, format: date, example: "2026-05-18" }
                                      status: { type: string, enum: [Taken, Missed, No Log], example: "Taken" }
                      alerts:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string, format: uuid }
                            type: { type: string, example: "deterioration" }
                            description: { type: string, example: "Symptom scores increased by 40%." }
                            severity: { type: string, example: "high" }
                            created_at: { type: string, format: date-time }
        401: { description: Unauthorized }
        403: { description: Forbidden }
        404: { description: Patient not found }

  /clinicians/analytics:
    get:
      summary: Get population-level analytics for the clinician
      description: Returns aggregated data for risk distribution, average symptom trends (4 weeks), and patient-level adherence comparisons.
      tags: [Clinician]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Clinician analytics fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Clinician analytics fetched successfully" }
                  data:
                    type: object
                    properties:
                      summary:
                        type: object
                        properties:
                          total_patients: { type: integer, example: 3 }
                          average_adherence: { type: number, example: 87.5 }
                          average_symptom_score: { type: number, example: 4.2 }
                          high_risk_patients: { type: integer, example: 1 }
                      risk_distribution:
                        type: object
                        properties:
                          low: { type: integer, example: 12 }
                          moderate: { type: integer, example: 5 }
                          high: { type: integer, example: 3 }
                      average_symptom_trend:
                        type: array
                        items:
                          type: object
                          properties:
                            week: { type: string, example: "Week 1" }
                            average_score: { type: number, example: 4.5 }
                      patient_adherence_comparison:
                        type: array
                        items:
                          type: object
                          properties:
                            patient_name: { type: string, example: "Michael Chen" }
                            adherence_percentage: { type: number, example: 92.5 }
        401: { description: Unauthorized }
        403: { description: Forbidden }
