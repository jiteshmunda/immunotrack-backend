paths:
  /medications/catalog:
    get:
      summary: Get medication catalog
      description: Returns all reference medications grouped by category.
      tags:
        - Medication
      security:
        - bearerAuth: []
      responses:
        200:
          description: Grouped medication list
          content:
            application/json:
              example:
                Antihistamine:
                  - id: "..."
                    name: "Cetirizine"
                    genericName: "Cetirizine HCl"
                    brandNames: "Zyrtec, Aller-Tec"

  /medications:
    get:
      summary: List patient's medication plan
      description: Returns only active medications assigned to the authenticated patient.
      tags:
        - Medication
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of medications
    
    post:
      summary: Add medication to plan
      description: Add a new medication (catalog-linked or custom) to the patient's plan.
      tags:
        - Medication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dose, frequency]
              properties:
                medicationId:
                  type: string
                  format: uuid
                  example: "00000000-0000-0000-0000-000000000000"
                name:
                  type: string
                  example: "Cetirizine"
                category:
                  type: string
                  example: "Antihistamine"
                dose:
                  type: string
                  example: "10mg"
                frequency:
                  type: string
                  example: "Daily"
                route:
                  type: string
                  example: "Oral"
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        201:
          description: Created

  /medications/{id}:
    delete:
      summary: Delete medication from plan
      description: Remove a medication entry from the patient's plan.
      tags:
        - Medication
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Success
